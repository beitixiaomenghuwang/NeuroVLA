# Training config for NeuroVLA on TeleAvatar dual-arm real-robot dataset
# Task: pick marker → hand over to left gripper → put into cup
# Action: 16-dim (left_ee_pose×7 + left_gripper_effort×1 + right_ee_pose×7 + right_gripper_effort×1)
# State:  14-dim (left_ee_pose×7 + right_ee_pose×7)
# VLM:    Qwen3-VL-4B-Instruct (frozen during training)
# Loss:   action diffusion loss only (no VLM loss)

run_id: neurovla_teleavatar_pick_marker
run_root_dir: results/Checkpoints
seed: 42
trackers: [jsonl, wandb]
wandb_entity: your_wandb_entity # ← replace with your W&B entity
wandb_project: neurovla_teleavatar
is_debug: false

framework:
  name: InternVLA-M1
  qwenvl:
    # Set to a local download path of Qwen/Qwen3-VL-4B-Instruct
    # e.g. ./playground/Pretrained_models/Qwen3-VL-4B-Instruct
    # or the HuggingFace model ID if network is available: Qwen/Qwen3-VL-4B-Instruct
    base_vlm: ./playground/Pretrained_models/Qwen3-VL-4B-Instruct
    attn_implementation: flash_attention_2
    # Qwen3-VL-4B text hidden size. Verify with:
    #   python -c "from transformers import AutoConfig; c=AutoConfig.from_pretrained('Qwen/Qwen3-VL-4B-Instruct'); print(c.text_config.hidden_size)"
    vl_hidden_dim: 2560
  dino:
    dino_backbone: dinov2_vits14
  layer_qformer:
    # For Qwen3-VL-4B (36 transformer layers), hidden_states has indices 0..36
    # indices 35 and 36 correspond to the last two transformer layer outputs
    qformer_start_layer: 35
    qformer_end_layer: 37
    num_query_tokens: 64
    input_dim: 2560 # must match vl_hidden_dim
    ouptput_dim: 768
    grad_scale: 0.5
  action_model:
    action_model_type: DiT-B
    action_hidden_dim: 768
    # After Rotate6D conversion (quat 4→rot6d 6):
    #   action: pos_L(3)+rot6d_L(6)+grip_L(1) + pos_R(3)+rot6d_R(6)+grip_R(1) = 20
    #   state:  pos_L(3)+rot6d_L(6)           + pos_R(3)+rot6d_R(6)           = 18
    action_dim: 20
    state_dim: 18
    use_ema: false
    future_action_window_size: 15 # predict 16 steps (15+1)
    past_action_window_size: 0
    repeated_diffusion_steps: 4 # lower for smaller GPU memory
  fm_head_config:
    input_embedding_dim: 1536
    hidden_size: 1024
    add_pos_embed: true
    max_seq_len: 1024
    action_dim: 20 # must match framework.action_model.action_dim
    state_dim: 18 # must match framework.action_model.state_dim
    future_action_window_size: 15
    action_horizon: 16
    past_action_window_size: 0
    noise_beta_alpha: 1.5
    noise_beta_beta: 1.0
    noise_s: 0.999
    num_timestep_buckets: 1000
    num_inference_timesteps: 4
    num_target_vision_tokens: 32
    diffusion_model_cfg:
      attention_head_dim: 48
      cross_attention_dim: 2560 # must match vl_hidden_dim
      dropout: 0.2
      final_dropout: true
      interleave_self_attention: true
      norm_type: "ada_norm"
      num_attention_heads: 32
      num_layers: 16
      output_dim: 1024
      positional_embeddings: null

  reduce_in_full_precision: true

datasets:
  # No VLM data: we only train the action head
  vla_data:
    dataset_py: lerobot_datasets
    # Path to the parent directory containing pick_marker_put_into_cup_20251113/
    # Adjust to absolute path if running from a different working directory
    data_root_dir: .
    data_mix: teleavatar_pick_marker
    action_type: abs_ee # absolute end-effector pose
    CoT_prompt: "Your task is {instruction}. Complete the task step by step."
    default_image_resolution: [3, 224, 224]
    image_size: [224, 224]
    per_device_batch_size: 8 # reduce if OOM; increase if GPU memory allows
    load_all_data_for_training: true
    obs: ["left_color"]

trainer:
  epochs: 200
  max_train_steps: 30000 # ~3-5 passes over 82k frames with bs=8×4GPU
  num_warmup_steps: 1000
  save_interval: 5000
  eval_interval: 500
  logging_frequency: 10

  learning_rate:
    base: 1.0e-05
    # qwen_vl_interface is frozen (set to a low value; frozen params won't update)
    qwen_vl_interface: 1.0e-05
    layer_qformer: 5.0e-05
    action_model: 1.0e-04
    dino_encoder: 1.0e-05
    dino_pro: 1.0e-05

  lr_scheduler_type: cosine_with_min_lr
  scheduler_specific_kwargs:
    min_lr: 1.0e-06

  freeze_modules: ""

  loss_scale:
    vla: 1.0
    vlm: 0.0 # no VLM loss

  repeated_diffusion_steps: 4

  max_grad_norm: 1.0
  warmup_ratio: 0.05
  weight_decay: 0.0
  gradient_clipping: 1.0
  gradient_accumulation_steps: 1

  optimizer:
    name: AdamW
    betas: [0.9, 0.95]
    eps: 1.0e-08
    weight_decay: 1.0e-08

  is_resume: false
  resume_from_checkpoint: null # ← set to checkpoint dir path, e.g. /path/to/run/checkpoints/steps_20000
  enable_gradient_checkpointing: true
  enable_mixed_precision_training: true
