# Training config for NeuroVLA SNN (Cerebellum-Spinal module) on TeleAvatar dual-arm dataset
# Task:   pick marker → hand over to left gripper → put into cup
# Action: 20-dim  pos_L(3)+rot6d_L(6)+grip_L(1) + pos_R(3)+rot6d_R(6)+grip_R(1)
# State:  18-dim  pos_L(3)+rot6d_L(6)            + pos_R(3)+rot6d_R(6)
# VLM:    Qwen3-VL-4B-Instruct (frozen)
# Loss:   L1 regression (SNN membrane potential → continuous action)
#
# Key difference vs neurovla_teleavatar.yaml (DiT version):
#   framework.name          : NeuroVLA  (SNN action head)
#   layer_qformer.num_query_tokens : 16  (== action_horizon, avoids seq-len mismatch)
#   fm_head_config          : removed  (DiT-only)

run_id: neurovla_snn_teleavatar_pick_marker
run_root_dir: results/Checkpoints
seed: 42
trackers: [jsonl, wandb]
wandb_entity: your_wandb_entity        # ← replace with your W&B entity
wandb_project: neurovla_snn_teleavatar
is_debug: false


framework:
  name: NeuroVLA                        # activates SNN cerebellum-spinal module
  qwenvl:
    base_vlm: ./playground/Pretrained_models/Qwen3-VL-4B-Instruct
    attn_implementation: flash_attention_2
    vl_hidden_dim: 2560
  dino:
    dino_backbone: dinov2_vits14
  layer_qformer:
    qformer_start_layer: 35
    qformer_end_layer: 37
    # IMPORTANT: num_query_tokens must equal the action prediction horizon (16).
    # The SNN maps each QFormer token → one action timestep.
    # If you change future_action_window_size below, update this to match.
    num_query_tokens: 30
    input_dim: 2560                     # must match vl_hidden_dim
    ouptput_dim: 768                    # QFormer output dim fed into SNN
    grad_scale: 0.5
  action_model:
    action_dim: 20                      # dual-arm Rotate6D + gripper ×2
    state_dim: 18                       # dual-arm pose only (no gripper), fed to GRU edit model
    hidden_dim: 1536                    # SNN hidden dim (768 × 2)

  reduce_in_full_precision: true


datasets:
  vla_data:
    dataset_py: lerobot_datasets
    data_root_dir: .
    data_mix: teleavatar_pick_marker
    action_type: abs_ee
    CoT_prompt: "Your task is {instruction}. Complete the task step by step."
    default_image_resolution: [3, 224, 224]
    image_size: [224, 224]
    per_device_batch_size: 8
    load_all_data_for_training: true
    past_action_window_size: 0


trainer:
  epochs: 200
  max_train_steps: 30000
  num_warmup_steps: 1000
  save_interval: 5000
  eval_interval: 500
  logging_frequency: 10

  learning_rate:
    base: 1.0e-05
    qwen_vl_interface: 1.0e-05             # VLM backbone frozen
    layer_qformer: 5.0e-05
    action_model: 1.0e-04              # SNN (MLPResNet)
    edit_model: 1.0e-04                # GRU-gated FiLM modulator
    dino_encoder: 1.0e-05
    dino_pro: 1.0e-05

  lr_scheduler_type: cosine_with_min_lr
  scheduler_specific_kwargs:
    min_lr: 1.0e-06

  freeze_modules: ''  # no frozen modules; all are trainable

  loss_scale:
    vla: 1.0
    vlm: 0.0

  # repeated_diffusion_steps is unused for SNN but kept to avoid KeyError in trainer
  repeated_diffusion_steps: 1

  max_grad_norm: 1.0
  warmup_ratio: 0.05
  weight_decay: 0.0
  gradient_clipping: 1.0
  gradient_accumulation_steps: 1

  optimizer:
    name: AdamW
    betas: [0.9, 0.95]
    eps: 1.0e-08
    weight_decay: 1.0e-08

  is_resume: false
  resume_from_checkpoint: null   # ← set to checkpoint dir path, e.g. /path/to/run/checkpoints/steps_20000
  enable_gradient_checkpointing: true
  enable_mixed_precision_training: true
